<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Workout">
<meta name="theme-color" content="#0a0a0a">
<title>Workout Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Bebas+Neue&display=swap" rel="stylesheet">

<style>
  :root {
    --accent: #e8ff47;
    --bg: #0a0a0a;
    --surface: #0d0d0d;
    --border: #1e1e1e;
    --muted: #444;
    --text: #f0f0f0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    min-height: -webkit-fill-available;
    overscroll-behavior: none;
  }
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
  input[type=number] { -moz-appearance: textfield; }

  #app { max-width: 480px; margin: 0 auto; }

  /* HEADER */
  .header {
    padding: 16px 16px 12px;
    border-bottom: 2px solid var(--accent);
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
    transition: border-color 0.3s;
  }
  .header-title { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 3px; }
  .header-sub { font-size: 9px; letter-spacing: 4px; color: var(--muted); text-transform: uppercase; margin-bottom: 2px; }
  .view-btns { display: flex; gap: 6px; }
  .view-btn {
    background: transparent;
    border: 1px solid #333;
    color: var(--muted);
    border-radius: 4px;
    padding: 6px 10px;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
  }
  .view-btn.active {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
  }

  /* DAY TABS */
  .day-tabs { display: grid; grid-template-columns: repeat(4,1fr); border-bottom: 1px solid #111; }
  .day-tab {
    background: transparent;
    border: none;
    border-bottom: 3px solid transparent;
    padding: 12px 4px 10px;
    cursor: pointer;
    color: var(--muted);
    font-family: inherit;
    transition: all 0.2s;
    text-align: center;
  }
  .day-tab.active { background: #111; color: var(--text); }
  .day-tab-label { font-size: 9px; letter-spacing: 2px; margin-bottom: 3px; }
  .day-tab-name { font-size: 12px; font-weight: 500; }
  .day-tab-focus { font-size: 8px; letter-spacing: 1px; margin-top: 2px; color: var(--muted); }
  .day-tab.active .day-tab-focus { color: var(--accent); }

  /* STATS BAR */
  .stats-bar { display: grid; grid-template-columns: repeat(4,1fr); background: #0d0d0d; border-bottom: 1px solid #111; }
  .stat { padding: 10px 0; text-align: center; border-right: 1px solid #111; }
  .stat:last-child { border-right: none; }
  .stat-val { font-size: 18px; font-weight: 500; color: var(--accent); }
  .stat-lbl { font-size: 8px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-top: 2px; }

  /* EXERCISE LIST */
  .ex-list { padding: 10px 10px 100px; }
  .ex-card {
    margin-bottom: 8px;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    background: var(--surface);
    transition: border-color 0.2s;
  }
  .ex-card.expanded { border-color: var(--accent); }
  .ex-header {
    width: 100%;
    background: transparent;
    border: none;
    padding: 13px 14px;
    cursor: pointer;
    color: var(--text);
    font-family: inherit;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
  }
  .ex-badge {
    width: 30px; height: 30px;
    border-radius: 50%;
    background: #1a1a1a;
    border: 2px solid #333;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700;
    color: var(--accent);
    flex-shrink: 0;
    transition: all 0.2s;
  }
  .ex-badge.done { background: var(--accent); color: #000; border-color: var(--accent); }
  .ex-info { text-align: left; flex: 1; }
  .ex-name { font-size: 13px; font-weight: 500; }
  .ex-meta { font-size: 10px; color: var(--muted); margin-top: 3px; }
  .ex-meta .last-kg { color: var(--accent); }
  .ex-chevron { color: #333; font-size: 14px; transition: transform 0.2s; flex-shrink: 0; }
  .ex-card.expanded .ex-chevron { transform: rotate(180deg); }

  /* SETS */
  .sets-area { border-top: 1px solid #111; padding: 12px 14px 14px; }
  .history-hint {
    background: #111; border-radius: 6px; padding: 7px 10px;
    margin-bottom: 10px; font-size: 10px; color: var(--muted);
    display: flex; gap: 14px; flex-wrap: wrap;
  }
  .history-hint .hw { color: #333; }
  .history-hint .hv { color: var(--accent); }
  .sets-grid-header {
    display: grid; grid-template-columns: 28px 1fr 1fr 38px;
    gap: 6px; margin-bottom: 6px;
  }
  .sets-col-hdr { font-size: 8px; color: #333; letter-spacing: 2px; text-transform: uppercase; }
  .set-row {
    display: grid; grid-template-columns: 28px 1fr 1fr 38px;
    gap: 6px; margin-bottom: 6px; align-items: center;
    transition: opacity 0.2s;
  }
  .set-row.done-row { opacity: 0.5; }
  .set-num { font-size: 12px; color: #333; font-weight: 700; text-align: center; }
  .set-input {
    background: #141414;
    border: 1px solid #222;
    border-radius: 6px;
    padding: 9px 8px;
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    width: 100%;
    outline: none;
    transition: border-color 0.2s;
    text-align: center;
  }
  .set-input:focus { border-color: var(--accent); }
  .set-input.has-val { border-color: rgba(232,255,71,0.4); }
  .set-tick {
    width: 38px; height: 38px;
    border-radius: 6px;
    background: #141414;
    border: 1px solid #333;
    color: #444;
    font-size: 16px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .set-tick.ticked { background: var(--accent); border-color: var(--accent); color: #000; }
  .note-input {
    width: 100%; background: #111; border: 1px solid #1a1a1a;
    border-radius: 6px; padding: 8px 10px; color: #666;
    font-family: inherit; font-size: 11px; margin-top: 6px; outline: none;
  }

  /* HISTORY VIEW */
  .history-view { padding: 14px 10px 100px; }
  .history-section-title { font-size: 10px; letter-spacing: 3px; color: #333; text-transform: uppercase; margin-bottom: 14px; }
  .week-block { margin-bottom: 20px; }
  .week-label { font-size: 10px; color: var(--accent); letter-spacing: 2px; margin-bottom: 8px; }
  .session-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px 14px; margin-bottom: 8px;
  }
  .session-card-header { display: flex; justify-content: space-between; margin-bottom: 8px; }
  .session-card-name { font-size: 13px; font-weight: 500; }
  .session-card-focus { font-size: 9px; letter-spacing: 1px; }
  .session-ex-row { display: flex; justify-content: space-between; margin-bottom: 3px; }
  .session-ex-name { font-size: 10px; color: var(--muted); }
  .session-ex-kg { font-size: 10px; color: var(--text); }
  .empty-state { color: #222; text-align: center; margin-top: 60px; font-size: 13px; line-height: 2; }

  /* BOTTOM NAV */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(10,10,10,0.95);
    backdrop-filter: blur(10px);
    border-top: 1px solid #1a1a1a;
    display: flex;
    max-width: 480px;
    margin: 0 auto;
    padding-bottom: env(safe-area-inset-bottom);
  }
  .nav-btn {
    flex: 1; background: transparent; border: none;
    padding: 12px 0; cursor: pointer; color: var(--muted);
    font-family: inherit; font-size: 9px; letter-spacing: 2px;
    text-transform: uppercase; transition: color 0.2s;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
  }
  .nav-btn.active { color: var(--accent); }
  .nav-icon { font-size: 20px; }
</style>
</head>
<body>
<div id="app"></div>

<script>
const PLAN = {
  "Άνω Α": {
    focus: "Δύναμη", color: "#e8ff47",
    exercises: [
      { id:"ua1", name:"Πιέσεις Αλτήρων (επίπεδο)", sets:4, reps:"6-8", rir:"1-2" },
      { id:"ua2", name:"Κωπηλασία Kettlebell", sets:4, reps:"6-8", rir:"1-2" },
      { id:"ua3", name:"Ώθηση Ώμων Αλτήρες", sets:3, reps:"8-10", rir:"2" },
      { id:"ua4", name:"Έλξεις Μονόζυγο", sets:3, reps:"max", rir:"2" },
      { id:"ua5", name:"Τρικέφαλα Τροχαλιοφόρο", sets:3, reps:"12-15", rir:"1-2" },
      { id:"ua6", name:"Κάμψεις Δικεφάλου", sets:3, reps:"12-15", rir:"1-2" },
    ]
  },
  "Κάτω Α": {
    focus: "Δύναμη", color: "#47c8ff",
    exercises: [
      { id:"la1", name:"Goblet Squat Kettlebell", sets:4, reps:"8-10", rir:"1-2" },
      { id:"la2", name:"Romanian Deadlift Αλτήρες", sets:3, reps:"8-10", rir:"2" },
      { id:"la3", name:"Πρέσα Ποδιών", sets:3, reps:"10-12", rir:"1-2" },
      { id:"la4", name:"Κάμψη Ποδοκνημικής", sets:3, reps:"10-12", rir:"1-2" },
      { id:"la5", name:"Άνοδος στις Μύτες", sets:4, reps:"12-15", rir:"1" },
    ]
  },
  "Άνω Β": {
    focus: "Υπερτροφία", color: "#ff6b47",
    exercises: [
      { id:"ub1", name:"Πιέσεις Αλτήρων (κεκλιμένο)", sets:4, reps:"10-12", rir:"1-2" },
      { id:"ub2", name:"Κωπηλασία Τροχαλιοφόρο", sets:4, reps:"10-12", rir:"1-2" },
      { id:"ub3", name:"Πλάγιες Αναγωγές Kettlebell", sets:3, reps:"15-20", rir:"1" },
      { id:"ub4", name:"Face Pull Τροχαλιοφόρο", sets:3, reps:"15-20", rir:"1" },
      { id:"ub5", name:"Εκτάσεις Τρικεφάλου", sets:3, reps:"12-15", rir:"1-2" },
      { id:"ub6", name:"Hammer Curl Αλτήρες", sets:3, reps:"12-15", rir:"1-2" },
    ]
  },
  "Κάτω Β": {
    focus: "Υπερτροφία", color: "#c847ff",
    exercises: [
      { id:"lb1", name:"Πρέσα Ποδιών", sets:4, reps:"12-15", rir:"1-2" },
      { id:"lb2", name:"Kettlebell Swing", sets:4, reps:"15-20", rir:"1" },
      { id:"lb3", name:"Lunges Αλτήρες", sets:3, reps:"10-12/πόδι", rir:"2" },
      { id:"lb4", name:"Κάμψη Ποδοκνημικής", sets:3, reps:"12-15", rir:"1-2" },
      { id:"lb5", name:"Έκταση Τετρακεφάλου", sets:3, reps:"15-20", rir:"1" },
      { id:"lb6", name:"Άνοδος στις Μύτες", sets:4, reps:"12-15", rir:"1" },
    ]
  }
};

const DAYS = ["Άνω Α","Κάτω Α","Άνω Β","Κάτω Β"];
const DAY_LABELS = ["ΔΕΥ","ΤΡΙ","ΠΕΜ","ΠΑΡ"];
const STORAGE_KEY = "stathis_workout_v2";

let state = {
  view: "workout",
  activeDay: "Άνω Α",
  expandedEx: null,
  log: {}
};

function loadLog() {
  try { const r = localStorage.getItem(STORAGE_KEY); return r ? JSON.parse(r) : {}; } catch { return {}; }
}
function saveLog() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state.log)); } catch {}
}
function getWeekKey() {
  const now = new Date();
  const jan1 = new Date(now.getFullYear(),0,1);
  const w = Math.ceil(((now-jan1)/86400000+jan1.getDay()+1)/7);
  return `${now.getFullYear()}-W${String(w).padStart(2,'0')}`;
}

state.log = loadLog();

function getExLog(week, day, exId) {
  return state.log[week]?.[day]?.[exId] || {};
}
function setExSetField(week, day, exId, setIdx, field, value) {
  if (!state.log[week]) state.log[week] = {};
  if (!state.log[week][day]) state.log[week][day] = {};
  if (!state.log[week][day][exId]) state.log[week][day][exId] = {};
  if (!state.log[week][day][exId][setIdx]) state.log[week][day][exId][setIdx] = {};
  state.log[week][day][exId][setIdx][field] = value;
  saveLog();
}
function setNoteField(week, day, exId, value) {
  if (!state.log[week]) state.log[week] = {};
  if (!state.log[week][day]) state.log[week][day] = {};
  if (!state.log[week][day][exId]) state.log[week][day][exId] = {};
  state.log[week][day][exId]._note = value;
  saveLog();
}

function getHistory(day, exId) {
  return Object.keys(state.log).sort().map(wk => {
    const exLog = state.log[wk]?.[day]?.[exId] || {};
    const entries = Object.entries(exLog).filter(([k,v]) => k !== '_note' && v?.kg);
    if (!entries.length) return null;
    const maxKg = Math.max(...entries.map(([,v]) => parseFloat(v.kg)||0));
    return { week: wk, maxKg };
  }).filter(Boolean);
}

function getTotalSessions() {
  return Object.values(state.log).reduce((a,wk) => a + Object.keys(wk).length, 0);
}

function render() {
  const week = getWeekKey();
  const plan = PLAN[state.activeDay];
  const accentColor = plan.color;

  // Update header border color
  document.documentElement.style.setProperty('--accent', accentColor);

  const dayLog = state.log[week]?.[state.activeDay] || {};
  const totalSets = plan.exercises.reduce((a,e) => a+e.sets, 0);
  const totalSessions = getTotalSessions();
  const weekNum = week.split('-W')[1];

  let html = `
  <div class="header" id="main-header">
    <div>
      <div class="header-sub">Workout Tracker</div>
      <div class="header-title">ΣΤΆΘΗΣ</div>
    </div>
    <div class="view-btns">
      <button class="view-btn ${state.view==='workout'?'active':''}" onclick="switchView('workout')">Προπόν.</button>
      <button class="view-btn ${state.view==='history'?'active':''}" onclick="switchView('history')">Ιστορικό</button>
    </div>
  </div>`;

  if (state.view === 'workout') {
    // Day tabs
    html += `<div class="day-tabs">`;
    DAYS.forEach((day, i) => {
      const d = PLAN[day];
      const dLog = state.log[week]?.[day] || {};
      const hasDone = Object.values(dLog).some(ex => Object.entries(ex).some(([k,v]) => k!=='_note' && v?.done));
      const isActive = state.activeDay === day;
      html += `<button class="day-tab ${isActive?'active':''}" onclick="switchDay('${day}')" style="${isActive?`border-bottom-color:${d.color}`:''}">
        <div class="day-tab-label">${DAY_LABELS[i]}</div>
        <div class="day-tab-name">${day}</div>
        <div class="day-tab-focus">${hasDone?'✓ DONE':d.focus.toUpperCase()}</div>
      </button>`;
    });
    html += `</div>`;

    // Stats
    html += `<div class="stats-bar">
      <div class="stat"><div class="stat-val">W${weekNum}</div><div class="stat-lbl">Εβδομάδα</div></div>
      <div class="stat"><div class="stat-val">${plan.exercises.length}</div><div class="stat-lbl">Ασκήσεις</div></div>
      <div class="stat"><div class="stat-val">${totalSets}</div><div class="stat-lbl">Σύν. Σετ</div></div>
      <div class="stat"><div class="stat-val">${totalSessions}</div><div class="stat-lbl">Sessions</div></div>
    </div>`;

    // Exercises
    html += `<div class="ex-list">`;
    plan.exercises.forEach(ex => {
      const exLog = dayLog[ex.id] || {};
      const completedSets = Object.entries(exLog).filter(([k,v]) => k!=='_note' && v?.done).length;
      const isExpanded = state.expandedEx === ex.id;
      const history = getHistory(state.activeDay, ex.id);
      const lastKg = history.length ? history[history.length-1].maxKg : null;
      const allDone = completedSets === ex.sets;

      html += `<div class="ex-card ${isExpanded?'expanded':''}">
        <button class="ex-header" onclick="toggleEx('${ex.id}')">
          <div class="ex-badge ${allDone?'done':''}">${allDone?'✓':`${completedSets}/${ex.sets}`}</div>
          <div class="ex-info">
            <div class="ex-name">${ex.name}</div>
            <div class="ex-meta">${ex.sets} σετ × ${ex.reps} · RIR ${ex.rir}${lastKg?` <span class="last-kg">· ${lastKg}kg</span>`:''}</div>
          </div>
          <div class="ex-chevron">▾</div>
        </button>`;

      if (isExpanded) {
        html += `<div class="sets-area">`;
        if (history.length) {
          html += `<div class="history-hint">`;
          history.slice(-4).forEach(h => {
            html += `<span><span class="hw">W${h.week.split('-W')[1]}: </span><span class="hv">${h.maxKg}kg</span></span>`;
          });
          html += `</div>`;
        }
        html += `<div class="sets-grid-header">
          <div class="sets-col-hdr">Σετ</div>
          <div class="sets-col-hdr" style="text-align:center">Κιλά</div>
          <div class="sets-col-hdr" style="text-align:center">Reps</div>
          <div></div>
        </div>`;
        for (let si=0; si<ex.sets; si++) {
          const s = exLog[si] || {};
          html += `<div class="set-row ${s.done?'done-row':''}">
            <div class="set-num">${si+1}</div>
            <input class="set-input ${s.kg?'has-val':''}" type="number" inputmode="decimal"
              placeholder="${lastKg||'kg'}" value="${s.kg||''}"
              onchange="updateField('${ex.id}',${si},'kg',this.value)">
            <input class="set-input ${s.reps?'has-val':''}" type="number" inputmode="numeric"
              placeholder="${ex.reps.includes('-')?ex.reps.split('-')[1]:ex.reps}" value="${s.reps||''}"
              onchange="updateField('${ex.id}',${si},'reps',this.value)">
            <button class="set-tick ${s.done?'ticked':''}" onclick="toggleTick('${ex.id}',${si})">✓</button>
          </div>`;
        }
        html += `<input class="note-input" type="text" placeholder="Σημειώσεις..."
          value="${exLog._note||''}" onchange="updateNote('${ex.id}',this.value)">
        </div>`;
      }
      html += `</div>`;
    });
    html += `</div>`;

  } else {
    // HISTORY VIEW
    const allWeeks = Object.keys(state.log).sort().reverse();
    html += `<div class="history-view">`;
    html += `<div class="history-section-title">Ιστορικό Προπονήσεων</div>`;
    if (!allWeeks.length) {
      html += `<div class="empty-state">Δεν υπάρχουν δεδομένα ακόμα.<br><span style="color:#333;font-size:11px">Ξεκίνα να καταγράφεις!</span></div>`;
    }
    allWeeks.forEach(wk => {
      const wkData = state.log[wk];
      const hasSessions = DAYS.some(day => {
        const dLog = wkData[day];
        return dLog && Object.values(dLog).some(ex => Object.entries(ex).some(([k,v])=>k!=='_note'&&v?.kg));
      });
      if (!hasSessions) return;
      html += `<div class="week-block">
        <div class="week-label">ΕΒΔΟΜΑΔΑ ${wk.split('-W')[1]} · ${wk.split('-W')[0]}</div>`;
      DAYS.forEach(day => {
        const dLog = wkData[day];
        if (!dLog) return;
        const d = PLAN[day];
        const exRows = d.exercises.map(ex => {
          const exLog = dLog[ex.id]||{};
          const entries = Object.entries(exLog).filter(([k,v])=>k!=='_note'&&v?.kg);
          if (!entries.length) return null;
          const maxKg = Math.max(...entries.map(([,v])=>parseFloat(v.kg)||0));
          return `<div class="session-ex-row">
            <span class="session-ex-name">${ex.name}</span>
            <span class="session-ex-kg">${maxKg}kg</span>
          </div>`;
        }).filter(Boolean).join('');
        if (!exRows) return;
        html += `<div class="session-card">
          <div class="session-card-header">
            <span class="session-card-name">${day}</span>
            <span class="session-card-focus" style="color:${d.color}">${d.focus.toUpperCase()}</span>
          </div>
          ${exRows}
        </div>`;
      });
      html += `</div>`;
    });
    html += `</div>`;
  }

  // Bottom nav
  html += `<div class="bottom-nav">
    <button class="nav-btn ${state.view==='workout'?'active':''}" onclick="switchView('workout')">
      <span class="nav-icon">🏋️</span>Προπόνηση
    </button>
    <button class="nav-btn ${state.view==='history'?'active':''}" onclick="switchView('history')">
      <span class="nav-icon">📈</span>Ιστορικό
    </button>
  </div>`;

  document.getElementById('app').innerHTML = html;
}

function switchView(v) { state.view = v; render(); }
function switchDay(day) { state.activeDay = day; state.expandedEx = null; render(); }
function toggleEx(id) { state.expandedEx = state.expandedEx === id ? null : id; render(); }
function updateField(exId, si, field, val) {
  setExSetField(getWeekKey(), state.activeDay, exId, si, field, val);
}
function updateNote(exId, val) {
  setNoteField(getWeekKey(), state.activeDay, exId, val);
}
function toggleTick(exId, si) {
  const week = getWeekKey();
  const cur = state.log[week]?.[state.activeDay]?.[exId]?.[si]?.done || false;
  setExSetField(week, state.activeDay, exId, si, 'done', !cur);
  render();
}

// PWA: inline manifest
const manifest = {
  name: "Workout Tracker - Στάθης",
  short_name: "Workout",
  start_url: ".",
  display: "standalone",
  background_color: "#0a0a0a",
  theme_color: "#0a0a0a",
  orientation: "portrait",
  icons: [
    { src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%230a0a0a'/><text y='.9em' font-size='80'>🏋️</text></svg>", sizes: "192x192", type: "image/svg+xml" },
    { src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%230a0a0a'/><text y='.9em' font-size='80'>🏋️</text></svg>", sizes: "512x512", type: "image/svg+xml" }
  ]
};
const mBlob = new Blob([JSON.stringify(manifest)], {type:'application/manifest+json'});
const mUrl = URL.createObjectURL(mBlob);
const mLink = document.createElement('link');
mLink.rel = 'manifest'; mLink.href = mUrl;
document.head.appendChild(mLink);

// Service Worker
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE = 'workout-v1';
    self.addEventListener('install', e => {
      e.waitUntil(caches.open(CACHE).then(c => c.addAll(['/'])));
      self.skipWaiting();
    });
    self.addEventListener('fetch', e => {
      e.respondWith(caches.match(e.request).then(r => r || fetch(e.request).catch(() => new Response('Offline'))));
    });
  `;
  const swBlob = new Blob([swCode], {type:'application/javascript'});
  const swUrl = URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swUrl).catch(()=>{});
}

render();
